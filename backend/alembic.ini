# A generic, single database configuration.

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Max length of characters to include in generated file name
truncate_slug_length = 40

# Support async environment migrations
revision_environment = false

# Allow modules to be imported
prepend_sys_path = true

# Version path separator (use os to adapt to Windows/Unix)
version_path_separator = os

[post_write_hooks]
# Post-write hooks to format scripts (e.g. using black or ruff)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
